<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max-Heap Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button onclick="window.location.href='../dsaquest/index.html'" style="background:red; color:white; padding:10px;">
   ⬅ Back to Main Menu
</button>
    <div class="controls">
        <h2>Max-Heap</h2>
        <input type="number" id="heapInput" placeholder="Enter Value">
        <button onclick="handleInsert()">Insert</button>
        <button onclick="handleUndo()" style="background: #9b59b6;">Undo</button> 
        <button onclick="handleExtract()" class="extract">Extract Max</button>
        <button onclick="location.reload()" style="background: #555;">Clear All</button>
    </div>

    <div class="main-content">
        <div class="visualizer-area">
            <div id="heap-canvas"></div>
            <div id="array-visualizer" class="array-container"></div>
        </div>

        <div class="sidebar">
            <h3>Logic Trace</h3>
            <ul id="trace-list"></ul>
        </div>
    </div>
    
    <script src="heap_logic.js"></script>
</body>
</html>
